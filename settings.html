<!DOCTYPE html>
<html lang="en">

<!-- ────────────────────────────────────────────── -->
<!-- #region HEAD
─────────────────────────────────────────────────── -->
<head>
  <meta charset="UTF-8" />
  <title>Holy Settings</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Dosis:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/CSInterface.js"></script>

  <!-- Theme bootstrap — read saved accent and decompose into HSL/RGB -->
  <script>
    (function STYLE_boot() {
      try {
        var hex = localStorage.getItem('hs_themeColor') || '#ff2c72';
        var clean = hex.replace('#', '');
        var bigint = parseInt(clean, 16);
        var r = (bigint >> 16) & 255;
        var g = (bigint >> 8) & 255;
        var b = bigint & 255;
        var r1 = r / 255, g1 = g / 255, b1 = b / 255;
        var max = Math.max(r1, g1, b1), min = Math.min(r1, g1, b1);
        var h = 0, s = 0, l = (max + min) / 2;
        if (max !== min) {
          var d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          if (max === r1)      h = (g1 - b1) / d + (g1 < b1 ? 6 : 0);
          else if (max === g1) h = (b1 - r1) / d + 2;
          else                 h = (r1 - g1) / d + 4;
          h /= 6;
        }
        var root = document.documentElement;
        root.style.setProperty('--accent', hex);
        root.style.setProperty('--ACCENT-H', Math.round(h * 360));
        root.style.setProperty('--ACCENT-S', Math.round(s * 100) + '%');
        root.style.setProperty('--ACCENT-L', Math.round(l * 100) + '%');
        root.style.setProperty('--ACCENT-RGB', r + ', ' + g + ', ' + b);
      } catch (err) {
        console.warn('[HolySettings] STYLE_boot failed', err);
      }
    })();
  </script>

  <!-- ────────────────────────────────────────────── -->
  <!-- SETTINGS PANEL STYLES
  ─────────────────────────────────────────────────── -->
  <style>
    /* ── BASE ──────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 11px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ────────────────────────────────────── */
    #hs-root {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .hs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 36px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .hs-header-title {
      font-family: var(--font-label);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-offwhite);
    }

    #hs-settings-view {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── SECTIONS & ROWS ───────────────────────────── */
    .hs-section {
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .hs-section-heading {
      font-family: var(--font-label);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 6px 10px 5px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--accent-mid);
    }

    .hs-row-actions {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
    }

    .hs-action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      justify-content: center;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-family: var(--font-label);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 8px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .hs-action-btn:hover {
      background: var(--accent-mid);
      border-color: var(--accent);
      color: var(--accent-offwhite);
    }

    .hs-action-btn:hover .hs-action-icon {
      color: var(--accent-offwhite);
    }

    .hs-action-icon {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: color var(--transition);
    }

    /* ── COLOR PICKER VIEW ─────────────────────────── */
    #hs-picker-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 8px;
      gap: 7px;
      min-height: 0;
    }

    #hs-spectrum {
      flex: 1;
      min-height: 0;
      width: 100%;
      cursor: crosshair;
      border: 1px solid var(--border-subtle);
      border-radius: 2px;
      display: block;
    }

    .hs-hue-wrap {
      flex-shrink: 0;
      height: 16px;
    }

    #hs-hue {
      display: block;
      width: 100%;
      height: 16px;
      cursor: ew-resize;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
    }

    .hs-hex-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      height: 26px;
    }

    .hs-hash {
      color: var(--text-muted);
      font-size: 11px;
      flex-shrink: 0;
    }

    #hs-hex-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-size: 11px;
      font-family: monospace;
      padding: 3px 6px;
      text-transform: uppercase;
      min-width: 0;
      height: 26px;
      outline: none;
    }

    #hs-hex-input:focus {
      border-color: var(--accent);
    }

    .hs-picker-btn {
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .hs-picker-btn--undo,
    .hs-picker-btn--apply,
    .hs-picker-btn--cancel {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    .hs-picker-btn--undo svg,
    .hs-picker-btn--apply svg,
    .hs-picker-btn--cancel svg {
      width: 12px;
      height: 12px;
    }

    .hs-picker-btn--undo:hover {
      background: var(--accent-mid);
      border-color: var(--accent);
      color: var(--accent);
    }

    .hs-picker-btn--apply:hover {
      background: var(--accent-mid);
      border-color: var(--accent);
      color: var(--accent-offwhite);
    }

    .hs-picker-btn--cancel:hover {
      background: rgba(220, 60, 60, 0.12);
      border-color: rgba(220, 80, 80, 0.5);
      color: rgba(220, 100, 100, 0.95);
    }

    /* ── FAVOURITES ────────────────────────────────── */
    .hs-favorites-row {
      display: flex;
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      padding-top: 4px;
      min-height: 28px;
    }

    .hs-fav-swatch {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      width: 34px;
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition);
    }

    .hs-fav-swatch:hover {
      transform: scale(1.1);
    }

    .hs-fav-swatch svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hs-fav-default {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      width: 20px;
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .hs-fav-default:hover {
      transform: scale(1.1);
    }

    .hs-fav-default svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hs-fav-add-btn {
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      cursor: pointer;
      width: 34px;
      height: 27px;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition), color var(--transition);
    }

    .hs-fav-add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<!-- #endregion -->

<body>

<!-- ────────────────────────────────────────────── -->
<!-- PANEL SCRIPT
─────────────────────────────────────────────────── -->
<script>
  (function () {

    // ── CSInterface ─────────────────────────────────
    var cs;
    try { cs = new CSInterface(); } catch (e) { cs = null; }

    // ═══════════════════════════════════════════════
    // COLOR HELPERS
    // ═══════════════════════════════════════════════

    function hexToRgb(hex) {
      var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return r ? { r: parseInt(r[1], 16), g: parseInt(r[2], 16), b: parseInt(r[3], 16) } : null;
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b);
      var h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        var d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function hsvToHex(h, s, v) {
      var r, g, b;
      var i = Math.floor(h / 60) % 6;
      var f = (h / 60) - Math.floor(h / 60);
      var p = v * (1 - s);
      var q = v * (1 - f * s);
      var t = v * (1 - (1 - f) * s);
      switch (i) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
      }
      function toH(x) {
        var h = Math.round(x * 255).toString(16);
        return h.length === 1 ? '0' + h : h;
      }
      return '#' + toH(r) + toH(g) + toH(b);
    }

    function hexToHsv(hex) {
      var rgb = hexToRgb(hex);
      if (!rgb) return null;
      var r = rgb.r / 255, g = rgb.g / 255, b = rgb.b / 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b);
      var h, s, v = max;
      var d = max - min;
      s = max === 0 ? 0 : d / max;
      if (max === min) {
        h = 0;
      } else {
        if (max === r)      h = (g - b) / d + (g < b ? 6 : 0);
        else if (max === g) h = (b - r) / d + 2;
        else                h = (r - g) / d + 4;
        h *= 60;
      }
      return { h: h, s: s, v: v };
    }

    // ═══════════════════════════════════════════════
    // COLOR BROADCASTING
    // ═══════════════════════════════════════════════

    function _broadcastColor(hex) {
      var rgb = hexToRgb(hex);
      if (!rgb) return;
      var root = document.documentElement;
      root.style.setProperty('--accent', hex);
      root.style.setProperty('--ACCENT-RGB', rgb.r + ', ' + rgb.g + ', ' + rgb.b);
      var hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
      root.style.setProperty('--ACCENT-H', hsl.h);
      root.style.setProperty('--ACCENT-S', hsl.s + '%');
      root.style.setProperty('--ACCENT-L', hsl.l + '%');
      if (cs) {
        try {
          var evt = new CSEvent('holy.scripture.color.change', 'APPLICATION');
          evt.data = JSON.stringify({ hex: hex });
          cs.dispatchEvent(evt);
        } catch (e) { /* non-fatal */ }
      }
    }

    function applyVibeColor(hex) {
      _broadcastColor(hex);
      localStorage.setItem('hs_themeColor', hex);
    }

    // ═══════════════════════════════════════════════
    // COLOR PICKER STATE
    // ═══════════════════════════════════════════════

    var _pickerH = 340;
    var _pickerS = 1.0;
    var _pickerV = 1.0;
    var _colorBeforeOpen = '#ff2c72';

    var _draggingSpec = false;
    var _draggingHue  = false;

    // ═══════════════════════════════════════════════
    // CANVAS DRAWING
    // ═══════════════════════════════════════════════

    var specCanvas = document.getElementById('hs-spectrum');
    var hueCanvas  = document.getElementById('hs-hue');

    function drawSpectrum() {
      var dpr  = window.devicePixelRatio || 1;
      var cssW = specCanvas.offsetWidth;
      var cssH = specCanvas.offsetHeight;
      if (cssW < 2 || cssH < 2) return;

      var pixW = Math.round(cssW * dpr);
      var pixH = Math.round(cssH * dpr);
      if (specCanvas.width !== pixW || specCanvas.height !== pixH) {
        specCanvas.width  = pixW;
        specCanvas.height = pixH;
      }

      var ctx = specCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      var gradH = ctx.createLinearGradient(0, 0, cssW, 0);
      gradH.addColorStop(0, '#ffffff');
      gradH.addColorStop(1, 'hsl(' + _pickerH + ', 100%, 50%)');
      ctx.fillStyle = gradH;
      ctx.fillRect(0, 0, cssW, cssH);

      var gradV = ctx.createLinearGradient(0, 0, 0, cssH);
      gradV.addColorStop(0, 'rgba(0,0,0,0)');
      gradV.addColorStop(1, 'rgba(0,0,0,1)');
      ctx.fillStyle = gradV;
      ctx.fillRect(0, 0, cssW, cssH);

      var cx = _pickerS * cssW;
      var cy = (1 - _pickerV) * cssH;
      ctx.beginPath();
      ctx.arc(cx, cy, 7, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, 7, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.92)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawHue() {
      var dpr  = window.devicePixelRatio || 1;
      var cssW = hueCanvas.offsetWidth;
      var cssH = hueCanvas.offsetHeight;
      if (cssW < 2 || cssH < 2) return;

      var pixW = Math.round(cssW * dpr);
      var pixH = Math.round(cssH * dpr);
      if (hueCanvas.width !== pixW || hueCanvas.height !== pixH) {
        hueCanvas.width  = pixW;
        hueCanvas.height = pixH;
      }

      var ctx = hueCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      var grad = ctx.createLinearGradient(0, 0, cssW, 0);
      for (var i = 0; i <= 6; i++) {
        grad.addColorStop(i / 6, 'hsl(' + (i * 60) + ', 100%, 50%)');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, cssW, cssH);

      var cx = (_pickerH / 360) * cssW;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(cx - 1.5, 0, 3, cssH);
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(cx - 1.5, 0, 3, cssH);
    }

    function drawAll() {
      drawSpectrum();
      drawHue();
    }

    // ═══════════════════════════════════════════════
    // PICKER INTERACTION
    // ═══════════════════════════════════════════════

    var hexInput = document.getElementById('hs-hex-input');

    function _onPickerChange() {
      var hex = hsvToHex(_pickerH, _pickerS, _pickerV);
      hexInput.value = hex.replace('#', '').toUpperCase();
      _broadcastColor(hex);
      drawAll();
    }

    function setPickerFromHex(hex) {
      var hsv = hexToHsv(hex);
      if (!hsv) return;
      _pickerH = hsv.h;
      _pickerS = hsv.s;
      _pickerV = hsv.v;
      hexInput.value = hex.replace('#', '').toUpperCase();
      drawAll();
    }

    specCanvas.addEventListener('mousedown', function (e) {
      _draggingSpec = true;
      _updateSpecPos(e);
    });

    function _updateSpecPos(e) {
      var rect = specCanvas.getBoundingClientRect();
      _pickerS = Math.max(0, Math.min(1, (e.clientX - rect.left)  / rect.width));
      _pickerV = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
      _onPickerChange();
    }

    hueCanvas.addEventListener('mousedown', function (e) {
      _draggingHue = true;
      _updateHuePos(e);
    });

    function _updateHuePos(e) {
      var rect = hueCanvas.getBoundingClientRect();
      _pickerH = Math.max(0, Math.min(360, (e.clientX - rect.left) / rect.width * 360));
      _onPickerChange();
    }

    document.addEventListener('mousemove', function (e) {
      if (_draggingSpec) _updateSpecPos(e);
      if (_draggingHue)  _updateHuePos(e);
    });

    document.addEventListener('mouseup', function () {
      _draggingSpec = false;
      _draggingHue  = false;
    });

    hexInput.addEventListener('input', function (e) {
      var val = e.target.value.trim().replace(/^#/, '');
      if (/^[0-9a-fA-F]{6}$/.test(val)) {
        var hsv = hexToHsv('#' + val);
        if (hsv) {
          _pickerH = hsv.h;
          _pickerS = hsv.s;
          _pickerV = hsv.v;
          _broadcastColor('#' + val.toUpperCase());
          drawAll();
        }
      }
    });

    hexInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('hs-apply-btn').click();
    });

    // ═══════════════════════════════════════════════
    // FOOTER BUTTONS
    // ═══════════════════════════════════════════════

    document.getElementById('hs-apply-btn').addEventListener('click', function () {
      var hex = hsvToHex(_pickerH, _pickerS, _pickerV);
      applyVibeColor(hex);
      window.close();
    });

    document.getElementById('hs-cancel-btn').addEventListener('click', function () {
      applyVibeColor(_colorBeforeOpen);
      window.close();
    });

    document.getElementById('hs-undo-btn').addEventListener('click', function () {
      setPickerFromHex(_colorBeforeOpen);
      _broadcastColor(_colorBeforeOpen);
    });

    // ═══════════════════════════════════════════════
    // VIEW SWITCHING
    // ═══════════════════════════════════════════════

    function showPickerView(startHex) {
      _colorBeforeOpen = startHex;
      document.getElementById('hs-settings-view').style.display = 'none';
      var pv = document.getElementById('hs-picker-view');
      pv.style.display = 'flex';
      document.getElementById('hs-title').textContent = 'ACCENT COLOR';

      var hsv = hexToHsv(startHex);
      if (hsv) {
        _pickerH = hsv.h;
        _pickerS = hsv.s;
        _pickerV = hsv.v;
      }
      hexInput.value = startHex.replace('#', '').toUpperCase();

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          drawAll();
          renderFavs();
        });
      });
    }

    // ═══════════════════════════════════════════════
    // VIBE BUTTON
    // ═══════════════════════════════════════════════

    var vibeBtn = document.getElementById('hsVibeBtn');
    if (vibeBtn) {
      vibeBtn.addEventListener('click', function () {
        var saved = localStorage.getItem('hs_themeColor') || '#ff2c72';
        showPickerView(saved);
      });
    }

    // ═══════════════════════════════════════════════
    // FAVOURITES
    // ═══════════════════════════════════════════════

    var FAV_KEY = 'hs_favColors';
    var FAV_MAX = 8;
    var FAV_TAG = 'M7.04,23.66L1.24,6.79C.27,3.96,2.37,1,5.38,1h17.76c1.87,0,3.53,1.19,4.14,2.95l5.8,16.87c.98,2.84-1.13,5.79-4.13,5.79-5.53,0-13.45,0-17.77,0-1.87,0-3.52-1.19-4.13-2.95Z';
    var DEFAULT_HEX = '#ff2c72';
    var DEFAULT_TAG = 'M3.5,1H9c1.87,0,3.53,1.19,4.14,2.95l5.8,16.87c.98,2.84-1.13,5.79-4.13,5.79H3.5c-1.8,0-2.5-1.8-2.5-4V4.11C1,2.5,2,1,3.5,1Z';

    function loadFavs() {
      try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch (e) { return []; }
    }
    function saveFavs(favs) {
      localStorage.setItem(FAV_KEY, JSON.stringify(favs));
    }

    function renderFavs() {
      var row = document.getElementById('hs-favorites-row');
      if (!row) return;
      row.innerHTML = '';

      var defBtn = document.createElement('button');
      defBtn.className = 'hs-fav-default';
      defBtn.title = 'Default: ' + DEFAULT_HEX.toUpperCase();
      defBtn.innerHTML = '<svg viewBox="0 0 19.5 27.61" xmlns="http://www.w3.org/2000/svg"><path d="' + DEFAULT_TAG + '" fill="' + DEFAULT_HEX + '"/></svg>';
      defBtn.addEventListener('click', function () {
        setPickerFromHex(DEFAULT_HEX);
        _broadcastColor(DEFAULT_HEX);
      });
      row.appendChild(defBtn);

      var favs = loadFavs();

      favs.forEach(function (hex, i) {
        var btn = document.createElement('button');
        btn.className = 'hs-fav-swatch';
        btn.title = '#' + hex.replace('#', '').toUpperCase() + ' — right-click to remove';
        btn.innerHTML = '<svg viewBox="0 0 34.31 27.61" xmlns="http://www.w3.org/2000/svg"><path d="' + FAV_TAG + '" fill="' + hex + '"/></svg>';

        btn.addEventListener('click', function () {
          setPickerFromHex(hex);
          _broadcastColor(hex);
        });

        btn.addEventListener('contextmenu', function (e) {
          e.preventDefault();
          var f = loadFavs();
          f.splice(i, 1);
          saveFavs(f);
          renderFavs();
        });

        row.appendChild(btn);
      });

      if (favs.length < FAV_MAX) {
        var addBtn = document.createElement('button');
        addBtn.className = 'hs-fav-add-btn';
        addBtn.title = 'Save current color as favourite';
        addBtn.textContent = '+';
        addBtn.addEventListener('click', function () {
          var hex = hsvToHex(_pickerH, _pickerS, _pickerV);
          var f = loadFavs();
          if (f.indexOf(hex) === -1) { f.push(hex); saveFavs(f); }
          renderFavs();
        });
        row.appendChild(addBtn);
      }
    }

    // ═══════════════════════════════════════════════
    // RESIZE HANDLER
    // ═══════════════════════════════════════════════

    window.addEventListener('resize', function () {
      if (document.getElementById('hs-picker-view').style.display !== 'none') {
        drawAll();
      }
    });

  })();
</script>

</html>
